name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fuse libegl1 libfuse2 wget
          python -m pip install --upgrade pip
          python -m pip install -e . pytest
      - name: Test
        run: pytest
      - name: Install appimagetool
        run: |
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool
      - name: Build artifacts
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          VERSION="${GITHUB_REF_NAME#v}" scripts/build_deb.sh
          VERSION="${GITHUB_REF_NAME#v}" scripts/build_appimage.sh
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes "$GITHUB_REF_NAME" --verify-tag
          fi
